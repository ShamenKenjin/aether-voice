<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aether — Voice AI</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%2300f0ff' stroke-width='3'/><circle cx='50' cy='50' r='20' fill='%2300f0ff' opacity='0.4'/></svg>">
</head>
<body>

<div id="app">

  <!-- ═══ ORB ZONE ═══════════════════════════════ -->
  <div id="orb-zone">
    <canvas id="orb-canvas"></canvas>
    <div id="orb-label" class="orb-label"></div>
  </div>

  <!-- ═══ CHAT AREA ══════════════════════════════ -->
  <div id="chat-area">
    <div id="chat-messages">
      <div class="chat-empty" id="chat-empty"></div>
    </div>
  </div>

  <!-- ═══ CONTROL BAR ═════════════════════════════ -->
  <div id="control-bar">
    <button id="btn-clear" class="ctrl-btn" title="Clear">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
    </button>

    <button id="btn-mic" class="mic-btn">
      <div class="mic-ring"></div>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3z"/><path d="M19 10v1a7 7 0 01-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2"/></svg>
    </button>

    <button id="btn-settings" class="ctrl-btn" title="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>

  <!-- ═══ SETTINGS PANEL ══════════════════════════ -->
  <div id="settings-overlay" class="overlay hidden">
    <div id="settings-panel" class="glass-panel">
      <h2 class="settings-title"></h2>

      <div class="settings-scroll">
        <div class="setting-group">
          <label class="setting-label" for="set-lang"></label>
          <select id="set-lang">
            <option value="th">ไทย</option>
            <option value="en">English</option>
          </select>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="set-theme"></label>
          <select id="set-theme">
            <option value="cyber">Cyber</option>
            <option value="midnight">Midnight</option>
            <option value="emerald">Emerald</option>
          </select>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="set-voice"></label>
          <select id="set-voice"><option value="">Auto</option></select>
          <small class="setting-hint"></small>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="set-rate"></label>
          <input type="range" id="set-rate" min="0.5" max="2.0" step="0.1" value="1.0">
          <span id="rate-value">1.0x</span>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="set-pitch"></label>
          <input type="range" id="set-pitch" min="0.5" max="2.0" step="0.1" value="1.0">
          <span id="pitch-value">1.0</span>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="set-apikey"></label>
          <input type="password" id="set-apikey" placeholder="sk-...">
          <small class="setting-hint"></small>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="set-prompt"></label>
          <textarea id="set-prompt" rows="3"></textarea>
        </div>

        <div class="setting-group toggle-group">
          <label class="setting-label"></label>
          <div class="toggle-row">
            <span class="toggle-text"></span>
            <div class="toggle" id="toggle-streaming"></div>
          </div>
        </div>

        <div class="setting-group toggle-group">
          <label class="setting-label"></label>
          <div class="toggle-row">
            <span class="toggle-text"></span>
            <div class="toggle" id="toggle-continuous"></div>
          </div>
        </div>
      </div>

      <div class="settings-actions">
        <button class="btn btn-ghost" id="btn-cancel-settings"></button>
        <button class="btn btn-accent" id="btn-save-settings"></button>
      </div>
    </div>
  </div>

  <!-- ═══ EXPORT OVERLAY ══════════════════════════ -->
  <div id="export-overlay" class="overlay hidden">
    <div class="glass-panel export-panel">
      <h3 id="export-title"></h3>
      <textarea id="export-text" readonly rows="12"></textarea>
      <div class="settings-actions">
        <button class="btn btn-ghost" id="btn-close-export"></button>
        <button class="btn btn-accent" id="btn-copy-export"></button>
      </div>
    </div>
  </div>

</div>

<!-- ═══ Scripts ═══════════════════════════════════ -->
<script src="js/config.js"></script>
<script src="js/speech.js"></script>
<script src="js/llm.js"></script>
<script src="js/conversation.js"></script>
<script src="js/orb.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
