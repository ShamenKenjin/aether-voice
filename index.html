<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aether — Voice AI</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020813">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%2300d2ff' stroke-width='3'/><circle cx='50' cy='50' r='20' fill='%2300d2ff' opacity='0.4'/></svg>">
</head>
<body>

<div id="hud">

  <!-- ═══ TOP BAR ═════════════════════════════════ -->
  <div id="top-bar">
    <div class="top-left">
      <span class="brand">AETHER</span>
      <span class="brand-sub">Voice AI</span>
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">READY</span>
    </div>
    <div class="top-right">
      <span class="clock" id="hud-clock">00:00:00</span>
      <span class="date" id="hud-date"></span>
    </div>
  </div>

  <!-- ═══ MAIN GRID ═══════════════════════════════ -->
  <div id="main-grid">

    <!-- LEFT SIDEBAR -->
    <div id="left-panel" class="hud-panel">
      <div class="panel-title">SYSTEM MONITOR</div>
      <div class="panel-body">
        <!-- Model -->
        <div class="stat-row">
          <span class="stat-label">MODEL</span>
          <span class="stat-value" id="stat-model">DeepSeek</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">STATUS</span>
          <span class="stat-value" id="stat-status">ONLINE</span>
        </div>

        <div class="divider"></div>

        <!-- Token Usage -->
        <div class="stat-row">
          <span class="stat-label">TOKENS IN</span>
          <span class="stat-value mono" id="stat-tokens-in">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">TOKENS OUT</span>
          <span class="stat-value mono" id="stat-tokens-out">0</span>
        </div>
        <div class="stat-bar-container">
          <div class="stat-bar-bg"><div class="stat-bar-fill" id="stat-bar-tokens"></div></div>
        </div>

        <div class="divider"></div>

        <!-- Cost -->
        <div class="stat-row">
          <span class="stat-label">COST</span>
          <span class="stat-value mono" id="stat-cost">$0.0000</span>
        </div>

        <!-- Response time -->
        <div class="stat-row">
          <span class="stat-label">RESP TIME</span>
          <span class="stat-value mono" id="stat-resptime">--</span>
        </div>

        <div class="divider"></div>

        <!-- Messages -->
        <div class="stat-row">
          <span class="stat-label">MESSAGES</span>
          <span class="stat-value mono" id="stat-messages">0</span>
        </div>

        <!-- Session -->
        <div class="stat-row">
          <span class="stat-label">SESSION</span>
          <span class="stat-value mono" id="stat-session">00:00</span>
        </div>
      </div>
    </div>

    <!-- CENTER: Orb + Chat -->
    <div id="center-col">
      <!-- Orb zone -->
      <div id="orb-zone">
        <canvas id="orb-canvas"></canvas>
        <div id="orb-label" class="orb-label">READY</div>
        <div class="orb-sublabels">
          <span>VOICE CHANNEL</span>
          <span>• SECURE</span>
        </div>
      </div>

      <!-- Chat area -->
      <div id="chat-area">
        <div id="chat-messages">
          <div class="chat-empty" id="chat-empty"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div id="right-panel" class="hud-panel">
      <div class="panel-title">CONVERSATION LOG</div>
      <div class="panel-body" id="conv-log">
        <div class="log-placeholder">No messages yet</div>
      </div>
      <div class="panel-actions">
        <button class="hud-btn" id="btn-new-chat">+ NEW CHAT</button>
        <button class="hud-btn" id="btn-clear-chat">CLEAR</button>
      </div>
    </div>

  </div>

  <!-- ═══ BOTTOM BAR ══════════════════════════════ -->
  <div id="bottom-bar">
    <button id="btn-mic" class="mic-btn">
      <div class="mic-ring"></div>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3z"/><path d="M19 10v1a7 7 0 01-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2"/></svg>
    </button>

    <div class="input-wrapper">
      <input type="file" id="file-input" accept=".txt,.md,.json,.csv,.js,.py,.html,.css,.xml,.yaml,.yml,.log,.env,.ini,.cfg,.ts,.tsx,.jsx,.png,.jpg,.jpeg,.gif,.webp,.bmp,.pdf" hidden>
      <button id="btn-attach" class="hud-icon-btn" title="Attach">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <span id="file-preview" class="file-preview hidden"></span>
      <input type="text" id="text-input" class="text-input" autocomplete="off">
    </div>

    <button id="btn-send" class="hud-btn send-btn">SEND</button>
    <button id="btn-settings" class="hud-icon-btn" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>

</div>

<!-- ═══ SETTINGS OVERLAY ══════════════════════════ -->
<div id="settings-overlay" class="overlay hidden">
  <div id="settings-panel" class="glass-panel">
    <h2 class="settings-title">SETTINGS</h2>
    <div class="settings-scroll">
      <div class="setting-group">
        <label class="setting-label">LANGUAGE</label>
        <select id="set-lang"><option value="th">ไทย</option><option value="en">English</option></select>
      </div>
      <div class="setting-group">
        <label class="setting-label">AI MODEL</label>
        <select id="set-provider"><option value="deepseek">DeepSeek</option><option value="gemini">Gemini</option></select>
      </div>
      <div class="setting-group">
        <label class="setting-label">VOICE</label>
        <select id="set-voice"><option value="">Auto</option></select>
        <small class="setting-hint"></small>
      </div>

      <div class="setting-group">
        <label class="setting-label">AI VOICE LANG</label>
        <select id="set-tts-lang">
          <option value="auto">Auto (ตามภาษา UI)</option>
          <option value="th">ไทย</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="setting-group">
        <label class="setting-label">SPEED</label>
        <input type="range" id="set-rate" min="0.5" max="2.0" step="0.1" value="1.0">
        <span id="rate-value">1.0x</span>
      </div>
      <div class="setting-group">
        <label class="setting-label">DEEPSEEK KEY</label>
        <input type="password" id="set-apikey" placeholder="sk-...">
      </div>
      <div class="setting-group">
        <label class="setting-label">GEMINI KEY</label>
        <input type="password" id="set-gemini-key" placeholder="AIza...">
      </div>
      <div class="setting-group">
        <label class="setting-label">SYSTEM PROMPT</label>
        <textarea id="set-prompt" rows="3"></textarea>
      </div>
      <div class="setting-group toggle-group">
        <label class="setting-label">STREAMING</label>
        <div class="toggle" id="toggle-streaming"></div>
      </div>
      <div class="setting-group toggle-group">
        <label class="setting-label">CONTINUOUS</label>
        <div class="toggle" id="toggle-continuous"></div>
      </div>
      <div class="setting-group toggle-group">
        <label class="setting-label">WAKE WORD</label>
        <div class="toggle" id="toggle-wakeword"></div>
      </div>
    </div>
    <div class="settings-actions">
      <button class="btn btn-ghost" id="btn-cancel-settings">CANCEL</button>
      <button class="btn btn-accent" id="btn-save-settings">SAVE</button>
    </div>
  </div>
</div>

<!-- ═══ SCRIPTS ═══════════════════════════════════ -->
<script src="js/config.js"></script>
<script src="js/vision.js"></script>
<script src="js/sfx.js"></script>
<script src="js/wakeword.js"></script>
<script src="js/speech.js"></script>
<script src="js/llm.js"></script>
<script src="js/conversation.js"></script>
<script src="js/orb.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>

</body>
</html>
